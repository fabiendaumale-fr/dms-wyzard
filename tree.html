<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DMS Wyzard — Arbre décisionnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0e15; --surf: #131720; --surf2: #1a1f2e;
      --bdr: #242938; --bdr2: #2e3548;
      --ink: #dde2f0; --muted: #556080;
      --ff-head: "Syne", sans-serif;
      --ff-body: "DM Sans", sans-serif;
      --ff-mono: "DM Mono", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--ink); font-family: var(--ff-body); font-size: 14px; height: 100vh; overflow: hidden; }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px; background: rgba(12,14,21,.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--bdr);
      display: flex; align-items: center; gap: 14px; padding: 0 20px;
    }
    .logo { font-family: var(--ff-head); font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: -.3px; }
    .logo-accent { color: #4f7cff; }
    .chip { font-family: var(--ff-mono); font-size: 10px; padding: 2px 8px; border-radius: 999px; background: rgba(79,124,255,.12); color: #4f7cff; border: 1px solid rgba(79,124,255,.2); }
    .sep { flex: 1; }

    /* TABS PRODUIT */
    .tabs { display: flex; gap: 4px; }
    .tab {
      padding: 6px 16px; border-radius: 8px; border: 1.5px solid var(--bdr2);
      background: transparent; color: var(--muted);
      font-family: var(--ff-body); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .tab:hover { color: var(--ink); border-color: var(--bdr2); }
    .tab.on { color: #fff; }

    /* BOUTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 8px; border: 1px solid var(--bdr2);
      background: var(--surf2); color: var(--ink); font-family: var(--ff-body);
      font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none;
      transition: all .15s;
    }
    .btn:hover { border-color: #4f7cff; color: #4f7cff; }
    .btn.pri { background: #4f7cff; border-color: #4f7cff; color: #fff; }
    .btn.pri:hover { background: #3d6be8; }

    /* VIEWPORT */
    #vp {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden; cursor: grab;
    }
    #vp.panning { cursor: grabbing; }
    #stage { position: absolute; transform-origin: 0 0; will-change: transform; }

    /* ZOOM */
    .zoom-bar {
      position: fixed; bottom: 20px; left: 20px; z-index: 50;
      display: flex; gap: 6px; align-items: center;
    }
    .zb { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--bdr2); background: var(--surf2); color: var(--ink); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .zb:hover { border-color: #4f7cff; color: #4f7cff; }
    .zl { font-family: var(--ff-mono); font-size: 11px; color: var(--muted); background: var(--surf2); border: 1px solid var(--bdr2); border-radius: 8px; padding: 0 10px; height: 30px; display: flex; align-items: center; min-width: 52px; justify-content: center; }

    /* LEGEND */
    .legend {
      position: fixed; bottom: 20px; right: 20px; z-index: 50;
      background: var(--surf); border: 1px solid var(--bdr2); border-radius: 10px;
      padding: 10px 14px; display: flex; flex-direction: column; gap: 6px;
    }
    .legend-title { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* PANEL EDIT */
    .panel {
      position: fixed; right: -440px; top: 52px; bottom: 0; z-index: 200;
      width: 420px; background: var(--surf); border-left: 1px solid var(--bdr2);
      display: flex; flex-direction: column; transition: right .22s cubic-bezier(.4,0,.2,1);
    }
    .panel.open { right: 0; }
    .ph { padding: 16px 20px; border-bottom: 1px solid var(--bdr); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .ph-title { font-family: var(--ff-head); font-size: 15px; font-weight: 700; }
    .pb { padding: 16px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .pf { padding: 14px 20px; border-top: 1px solid var(--bdr); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
    .xbtn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 3px; border-radius: 6px; display: flex; align-items: center; }
    .xbtn:hover { color: var(--ink); }

    /* CHAMPS */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .field input, .field select, .field textarea {
      background: var(--surf2); border: 1px solid var(--bdr2); border-radius: 8px;
      color: var(--ink); font-family: var(--ff-body); font-size: 13px;
      padding: 8px 11px; width: 100%; transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: #4f7cff; box-shadow: 0 0 0 3px rgba(79,124,255,.15); }
    .field textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rpills { display: flex; gap: 6px; flex-wrap: wrap; }
    .rp {
      padding: 5px 11px; border-radius: 999px; border: 1px solid var(--bdr2);
      color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .rp:hover { color: var(--ink); }
    .rp.on { border-color: #4f7cff; color: #4f7cff; background: rgba(79,124,255,.12); }

    /* TOAST */
    .toasts { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
    .toast { padding: 9px 18px; border-radius: 10px; background: var(--surf2); border: 1px solid var(--bdr2); font-size: 13px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,.5); white-space: nowrap; animation: tIn .18s ease; }
    .toast.ok { border-color: rgba(16,185,129,.4); color: #10b981; }
    .toast.er { border-color: rgba(239,68,68,.4); color: #ef4444; }
    @keyframes tIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes tOut { to{opacity:0;transform:translateY(6px)} }
    .toast.dy { animation: tOut .18s ease forwards; }

    /* LOADER */
    #loader { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; align-items: center; justify-content: center; gap: 14px; }
    .ring { width: 32px; height: 32px; border: 3px solid var(--bdr2); border-top-color: #4f7cff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ring-label { font-family: var(--ff-mono); font-size: 12px; color: var(--muted); }
  </style>
</head>

<div id="loader"><div class="ring"></div><div class="ring-label">Chargement…</div></div>

<header class="topbar">
  <div class="logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    DMS Wyzard <span class="logo-accent">·</span> Arbre

    Ajuster
  </button>
  <a class="btn" href="editor.html">Éditeur</a>
  <a class="btn" href="index.html">Wizard</a>
</header>

<div id="vp"><div id="stage"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div></div>

<div class="zoom-bar">
  <button class="zb" onclick="doZoom(-.15)">−</button>
  <div class="zl" id="zlabel">100%</div>
  <button class="zb" onclick="doZoom(+.15)">+</button>
</div>

<div class="legend" id="legend"></div>

<!-- panel edit -->
<div class="panel" id="panel">
  <div class="ph">
    <div class="ph-title" id="ptitle">Modifier la règle</div>
    <button class="xbtn" onclick="closePanel()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="pb" id="pbody"></div>
  <div class="pf">
    <button class="btn" onclick="closePanel()">Annuler</button>
    <button class="btn pri" onclick="saveRule()">Enregistrer</button>
  </div>
</div>

/* ===== CONFIG GITHUB ===== */
let cfg = {};
let fileSha = null;
let DATA = JSON.parse(JSON.stringify(RAW));
let editIdx = null;
let curProduct = null;

/* ===== COULEURS ===== */
const COLORS = { WTB:'#4f7cff', WTC:'#10b981', WF:'#f59e0b', SSM:'#ec4899' };
function pc(p){ return COLORS[p]||'#6366f1'; }

/* ===== LAYOUT CONSTANTS ===== */
const CW = 160;  // col width
const CH = 44;   // cell height
const GAP_X = 80;
const GAP_Y = 14;
const LEAF_W = 170;
const LEAF_H = 62;
const PAD = 60;

/* ===== SVG ===== */
const svg = document.getElementById('svg');

function svgEl(tag, attrs){
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs||{}).forEach(([k,v])=> el.setAttribute(k,v));
  return el;
}

function colX(i){ return PAD + i*(CW+GAP_X); }

/* ===== BUILD ARBRE D'UN PRODUIT ===== */
/*
  Structure : Produit (col0) → DMS (col1) → [Q1 (col2)] → [Q2 (col3)] → ... → Résultat (dernière col)
  On calcule la hauteur de chaque sous-arbre de façon récursive puis on place.
*/

let nodes=[], edges=[];

function questions(prod){
  const ap = DATA.applicabilityByProduct[prod]||{};
  const qs=[];
  if(ap.askRedistribution)    qs.push({key:'RedistributionNeeded', short:'Redistrib?'});
  if(ap.askExistingInterface) qs.push({key:'ExistingInterface',    short:'Interface?'});
  if(ap.askB2BPricing)        qs.push({key:'B2BPricingInDMS',     short:'Prix B2B?'});
  if(ap.askReferenceUsage)    qs.push({key:'ReferenceUsage',      short:'Référence?'});
  return qs;
}

/* Retourne la hauteur en px occupée par ce sous-arbre à partir de baseY, en créant les nœuds/edges */
function buildBranch(rules, qIdx, qs, col, baseY, parentId, edgeLabel, color){
  // Cas feuille : plus de questions ou règle directe
  if(qIdx >= qs.length || rules.length===0){
    // une seule feuille par groupe (on prend la première règle représentative)
    const r = rules[0];
    const idx = r ? DATA.decisionRowsLite.indexOf(r) : -1;
    const nid = `n${nodes.length}`;
    nodes.push({ id:nid, type:'leaf', x:colX(col), y:baseY,
      w:LEAF_W, h:LEAF_H, color,
      cost:r?.Cost||'—', dmsCost:r?.DMSCost||'',
      ruleIdx: idx>=0?idx:null });
    if(parentId) edges.push({from:parentId, to:nid, label:edgeLabel, color});
    return LEAF_H;
  }

  const q = qs[qIdx];
  // Grouper par valeur de cette question
  const groups={};
  rules.forEach(r=>{
    const v = r[q.key]??'—';
    if(!groups[v]) groups[v]=[];
    groups[v].push(r);
  });

  // Nœud question
  const qnid = `n${nodes.length}`;
  nodes.push({ id:qnid, type:'q', x:colX(col), y:baseY, w:CW, h:CH, color, label:q.short });
  if(parentId) edges.push({from:parentId, to:qnid, label:edgeLabel, color});

  let totalH=0;
  const entries = Object.entries(groups);
  entries.forEach(([val,subRules],i)=>{
    const childY = baseY + totalH;
    const h = buildBranch(subRules, qIdx+1, qs, col+1, childY, qnid, labelYN(val), color);
    totalH += h + (i<entries.length-1 ? GAP_Y : 0);
  });

  // Centrer le nœud question sur ses enfants
  const qnode = nodes.find(n=>n.id===qnid);
  if(qnode) qnode.y = baseY + (totalH - CH)/2;

  return Math.max(CH, totalH);
}

function labelYN(v){
  if(!v||v==='—') return '?';
  if(v==='Y') return 'Oui';
  if(v==='N') return 'Non';
  return v;
}

function buildTree(prod){
  nodes=[]; edges=[];
  const color = pc(prod);
  const qs = questions(prod);
  const dmsList = DATA.dmsByProduct[prod]||[];
  const allRules = DATA.decisionRowsLite.filter(r=>r.Product===prod);

  // Nœud racine produit
  const rootId = 'root';
  nodes.push({ id:rootId, type:'root', x:colX(0), y:0, w:CW, h:CH, color, label:prod });

  let totalH=0;
  dmsList.forEach((dms,di)=>{
    const dmsRules = allRules.filter(r=>r.DMS===dms);
    const dmsNid = `dms${di}`;
    const baseY = totalH;

    // Nœud DMS
    nodes.push({ id:dmsNid, type:'dms', x:colX(1), y:baseY, w:CW, h:CH, color, label:dms });
    edges.push({from:rootId, to:dmsNid, color});

    let h;
    if(dmsRules.length===0 || qs.length===0){
      // Feuille directe
      const r = dmsRules[0];
      const idx = r ? DATA.decisionRowsLite.indexOf(r) : -1;
      const fnid = `leaf_${di}`;
      nodes.push({ id:fnid, type:'leaf', x:colX(2), y:baseY, w:LEAF_W, h:LEAF_H, color,
        cost:r?.Cost||'—', dmsCost:r?.DMSCost||'', ruleIdx:idx>=0?idx:null });
      edges.push({from:dmsNid, to:fnid, color});
      h = LEAF_H;
    } else {
      h = buildBranch(dmsRules, 0, qs, 2, baseY, dmsNid, null, color);
    }

    // Centrer DMS
    const dmsNode = nodes.find(n=>n.id===dmsNid);
    if(dmsNode) dmsNode.y = baseY + (h - CH)/2;

    totalH += h + GAP_Y*2;
  });

  // Centrer racine
  const rootNode = nodes.find(n=>n.id===rootId);
  if(rootNode) rootNode.y = (totalH - GAP_Y*2)/2 - CH/2;
}

/* ===== RENDU SVG ===== */
function renderTree(prod){
  buildTree(prod);
  svg.innerHTML='';

  const maxX = Math.max(...nodes.map(n=>n.x+n.w))+PAD;
  const maxY = Math.max(...nodes.map(n=>n.y+(n.h||CH)))+PAD;
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);

  // Defs
  const defs = svgEl('defs');
  svg.appendChild(defs);

  // Edges d'abord (sous les nœuds)
  const eGroup = svgEl('g');
  svg.appendChild(eGroup);

  edges.forEach(e=>{
    const fn = nodes.find(n=>n.id===e.from);
    const tn = nodes.find(n=>n.id===e.to);
    if(!fn||!tn) return;

    const x1 = fn.x + fn.w;
    const y1 = fn.y + (fn.h||CH)/2;
    const x2 = tn.x;
    const y2 = tn.y + (tn.h||CH)/2;
    const mx = (x1+x2)/2;

    const path = svgEl('path',{
      d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,
      fill:'none', stroke:e.color+'55', 'stroke-width':'1.8',
      'stroke-linecap':'round'
    });
    eGroup.appendChild(path);

    if(e.label){
      const lx = mx, ly = (y1+y2)/2;
      const bg = svgEl('rect',{ x:lx-16, y:ly-9, width:32, height:17, rx:4, fill:'#1a1f2e' });
      const lt = svgEl('text',{
        x:lx, y:ly+4, 'text-anchor':'middle',
        'font-family':'"DM Mono",monospace', 'font-size':'10', fill:e.color+'cc'
      });
      lt.textContent = e.label;
      eGroup.appendChild(bg);
      eGroup.appendChild(lt);
    }
  });

  // Nœuds
  const nGroup = svgEl('g');
  svg.appendChild(nGroup);

  nodes.forEach(n=>{
    const g = svgEl('g',{ style:'cursor:'+(n.type==='leaf'?'pointer':'default') });
    if(n.type==='leaf' && n.ruleIdx!==null){
      g.addEventListener('click',()=>openPanel(n.ruleIdx));
    }

    if(n.type==='root'){
      const rect = svgEl('rect',{
        x:n.x, y:n.y, width:n.w, height:n.h, rx:10,
        fill:n.color+'22', stroke:n.color, 'stroke-width':'2'
      });
      const txt = svgEl('text',{
        x:n.x+n.w/2, y:n.y+n.h/2+5, 'text-anchor':'middle',
        'font-family':'"Syne",sans-serif', 'font-size':'16', 'font-weight':'800', fill:n.color
      });
      txt.textContent = n.label;
      g.appendChild(rect); g.appendChild(txt);

    } else if(n.type==='dms'){
      const rect = svgEl('rect',{
        x:n.x, y:n.y, width:n.w, height:n.h, rx:8,
        fill:'#1a1f2e', stroke:n.color+'88', 'stroke-width':'1.5'
      });
      const txt = svgEl('text',{
        x:n.x+n.w/2, y:n.y+n.h/2+5, 'text-anchor':'middle',
        'font-family':'"DM Sans",sans-serif', 'font-size':'12', 'font-weight':'600', fill:n.color
      });
      txt.textContent = n.label;
      g.appendChild(rect); g.appendChild(txt);

    } else if(n.type==='q'){
      const rect = svgEl('rect',{
        x:n.x, y:n.y, width:n.w, height:n.h, rx:8,
        fill:'#131720', stroke:'#2e3548', 'stroke-width':'1.5',
        'stroke-dasharray':'5,3'
      });
      const txt = svgEl('text',{
        x:n.x+n.w/2, y:n.y+n.h/2+5, 'text-anchor':'middle',
        'font-family':'"DM Sans",sans-serif', 'font-size':'11', fill:'#6b7db3'
      });
      txt.textContent = n.label;
      g.appendChild(rect); g.appendChild(txt);

    } else if(n.type==='leaf'){
      // Fond coloré
      const rect = svgEl('rect',{
        x:n.x, y:n.y, width:n.w, height:n.h, rx:10,
        fill:n.color+'18', stroke:n.color+'55', 'stroke-width':'1.5'
      });
      // Cost
      const t1 = svgEl('text',{
        x:n.x+12, y:n.y+22,
        'font-family':'"DM Mono",monospace', 'font-size':'12', 'font-weight':'500', fill:'#dde2f0'
      });
      t1.textContent = n.cost;
      // DMS cost
      const t2 = svgEl('text',{
        x:n.x+12, y:n.y+38,
        'font-family':'"DM Sans",sans-serif', 'font-size':'10', fill:'#556080'
      });
      // Tronquer si trop long
      const dc = n.dmsCost||'';
      t2.textContent = dc.length>28 ? dc.slice(0,27)+'…' : dc;
      // Indicateur "cliquable"
      if(n.ruleIdx!==null){
        const edit = svgEl('text',{
          x:n.x+n.w-10, y:n.y+14,
          'text-anchor':'end', 'font-family':'"DM Sans",sans-serif',
          'font-size':'9', 'font-weight':'700', fill:n.color+'99',
          style:'text-transform:uppercase;letter-spacing:.06em'
        });
        edit.textContent = '✎ éditer';
        g.appendChild(rect); g.appendChild(t1); g.appendChild(t2); g.appendChild(edit);
      } else {
        g.appendChild(rect); g.appendChild(t1); g.appendChild(t2);
      }

      // Hover effect
      g.addEventListener('mouseenter',()=>{ rect.setAttribute('fill', n.color+'30'); rect.setAttribute('stroke', n.color); });
      g.addEventListener('mouseleave',()=>{ rect.setAttribute('fill', n.color+'18'); rect.setAttribute('stroke', n.color+'55'); });
    }

    nGroup.appendChild(g);
  });
}

function renderLegend(){
  const el = document.getElementById('legend');
  el.innerHTML = `<div class="legend-title">Légende</div>
    <div class="legend-row"><div class="legend-dot" style="background:#1a1f2e;border:1.5px solid #4f7cff88"></div>DMS</div>
    <div class="legend-row"><div class="legend-dot" style="background:#131720;border:1.5px dashed #2e3548"></div>Question</div>
    <div class="legend-row"><div class="legend-dot" style="background:#4f7cff18;border:1.5px solid #4f7cff55"></div>Résultat (cliquable)</div>`;
}

/* ===== PAN & ZOOM ===== */
let tx=60, ty=60, sc=1, panning=false, px0, py0, tx0, ty0;
const vp = document.getElementById('vp');
const stage = document.getElementById('stage');

vp.addEventListener('mousedown', e=>{
  if(e.target.closest('.panel')) return;
  panning=true; px0=e.clientX; py0=e.clientY; tx0=tx; ty0=ty;
  vp.classList.add('panning');
});
window.addEventListener('mousemove', e=>{
  if(!panning) return;
  tx=tx0+e.clientX-px0; ty=ty0+e.clientY-py0; applyT();
});
window.addEventListener('mouseup',()=>{ panning=false; vp.classList.remove('panning'); });
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  const d = -e.deltaY*.0008;
  const nsc = Math.min(3, Math.max(.1, sc+d));
  const r = vp.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  tx = mx-(mx-tx)*(nsc/sc);
  ty = my-(my-ty)*(nsc/sc);
  sc=nsc; applyT();
},{passive:false});

function applyT(){
  stage.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
  document.getElementById('zlabel').textContent = Math.round(sc*100)+'%';
}
function doZoom(d){ sc=Math.min(3,Math.max(.1,sc+d)); applyT(); }
function fitView(){
  if(!nodes.length) return;
  const vw=vp.clientWidth, vh=vp.clientHeight;
  const minX=Math.min(...nodes.map(n=>n.x));
  const maxX=Math.max(...nodes.map(n=>n.x+n.w));
  const minY=Math.min(...nodes.map(n=>n.y));
  const maxY=Math.max(...nodes.map(n=>n.y+(n.h||CH)));
  const tw=maxX-minX, th=maxY-minY;
  sc = Math.min(2.5, Math.max(.15, Math.min((vw-120)/tw, (vh-120)/th)));
  tx = (vw-tw*sc)/2 - minX*sc;
  ty = (vh-th*sc)/2 - minY*sc;
  applyT();
}

/* ===== PANEL EDIT ===== */
const YN=[{v:null,l:'—'},{v:'Y',l:'Oui'},{v:'N',l:'Non'},{v:'ANY',l:'ANY'}];

function radioField(label, gid, cur){
  const pills = YN.map(o=>{
    const on = (o.v===cur||(o.v===null&&(cur===null||cur===undefined)))?'on':'';
    const dv = o.v===null?'__null__':o.v;
    return `<span class="rp ${on}" data-g="${gid}" data-v="${dv}">${o.l}</span>`;
  }).join('');
  return `<div class="field"><label>${label}</label><div class="rpills" id="${gid}">${pills}</div></div>`;
}
function getRV(gid){
  const el = document.querySelector(`#pbody #${gid} .rp.on`);
  if(!el) return null;
  return el.dataset.v==='__null__'?null:el.dataset.v;
}

function openPanel(idx){
  editIdx=idx;
  const r = DATA.decisionRowsLite[idx];
  document.getElementById('ptitle').textContent = `${r.Product} · ${r.DMS}`;
  const body = document.getElementById('pbody');
  body.innerHTML = `
    <div class="field-row">
      <div class="field"><label>Coût WYZ</label><input id="p-cost" value="${esc(r.Cost||'')}"></div>
      <div class="field"><label>Coût DMS</label><input id="p-dmsc" value="${esc(r.DMSCost||'')}"></div>
    </div>
    ${radioField('Redistribution','p-redis',r.RedistributionNeeded)}
    ${radioField('Interface existante','p-exist',r.ExistingInterface)}
    ${radioField('Prix B2B','p-b2b',r.B2BPricingInDMS)}
    ${radioField('Référence','p-ref',r.ReferenceUsage)}
    <div class="field"><label>Méthodologie</label><textarea id="p-meth">${esc(r.Methodology||'')}</textarea></div>
    <div class="field"><label>Capacité</label><textarea id="p-cap" style="min-height:52px">${esc(r.Capability||'')}</textarea></div>
    <div class="field-row">
      <div class="field"><label>Lien cahier des charges</label><input id="p-spec" value="${esc(r.SpecificationLink||'')}"></div>
      <div class="field"><label>Formulaire DMS</label><input id="p-req" value="${esc(r.RequestFormLink||'')}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Notes</label><input id="p-notes" value="${esc(r.Notes||'')}"></div>
      <div class="field"><label>Mise à jour</label><input id="p-upd" value="${esc(r.LastUpdated||'')}"></div>
    </div>`;

  // Bind radio pills
  body.querySelectorAll('.rp').forEach(pill=>{
    pill.addEventListener('click',()=>{
      body.querySelectorAll(`.rp[data-g="${pill.dataset.g}"]`).forEach(p=>p.classList.remove('on'));
      pill.classList.add('on');
    });
  });

  document.getElementById('panel').classList.add('open');
}

function closePanel(){ document.getElementById('panel').classList.remove('open'); editIdx=null; }

async function saveRule(){
  if(editIdx===null) return;
  const r = DATA.decisionRowsLite[editIdx];
  r.Cost = fv('p-cost'); r.DMSCost = fv('p-dmsc');
  r.RedistributionNeeded = getRV('p-redis');
  r.ExistingInterface = getRV('p-exist');
  r.B2BPricingInDMS = getRV('p-b2b');
  r.ReferenceUsage = getRV('p-ref');
  r.Methodology = fv('p-meth'); r.Capability = fv('p-cap');
  r.SpecificationLink = fv('p-spec'); r.RequestFormLink = fv('p-req');
  r.Notes = fv('p-notes'); r.LastUpdated = fv('p-upd');
  closePanel();
  renderTree(curProduct);
  if(cfg.token){ await push(); } else { toast('Modifié localement — non connecté GitHub','ok'); }
}
function fv(id){ const e=document.getElementById(id); return e?(e.value.trim()||null):null; }

/* ===== GITHUB ===== */
async function push(){
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(DATA,null,2))));
  const now = new Date().toISOString().slice(0,16).replace('T',' ');
  try{
    const res = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'data.json'}`,{
      method:'PUT',
      headers:{Authorization:`Bearer ${cfg.token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`chore: DMS Wyzard tree edit (${now})`,content,branch:cfg.branch||'main',...(fileSha?{sha:fileSha}:{})})
    });
    if(!res.ok){const e=await res.json();throw new Error(e.message);}
    const j=await res.json(); fileSha=j.content.sha;
    toast('Sauvegardé sur GitHub ✓','ok');
  }catch(e){ toast('Erreur GitHub : '+e.message,'er'); }
}

async function fetchSha(){
  if(!cfg.token||!cfg.owner||!cfg.repo) return;
  try{
    const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'data.json'}?ref=${cfg.branch||'main'}`,
      {headers:{Authorization:`Bearer ${cfg.token}`,Accept:'application/vnd.github+json'}});
    if(res.ok){const j=await res.json();fileSha=j.sha;}
  }catch(e){}
}

/* ===== TOAST ===== */
function toast(msg, type='ok'){
  const wrap=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>{el.classList.add('dy');setTimeout(()=>el.remove(),200);},3000);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ===== INIT ===== */
async function init(){
  // GitHub config
  try{ cfg=JSON.parse(localStorage.getItem('wyzard_cfg')||'{}'); }catch(e){cfg={};}
  if(cfg.token) fetchSha();

  // Charger data distant si possible
  const url = cfg.owner&&cfg.repo
    ? `https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${cfg.branch||'main'}/${cfg.path||'data.json'}?t=${Date.now()}`
    : null;
  if(url){
    try{
      const res=await fetch(url);
      if(res.ok) DATA=await res.json();
    }catch(e){}
  }

  document.getElementById('loader').style.display='none';
  curProduct = DATA.products[0];
  renderTabs();
  renderLegend();
  renderTree(curProduct);
  setTimeout(fitView,60);
}

init();
</script>
